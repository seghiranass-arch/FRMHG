version: '3.8'

services:
  # Database
  postgres:
    image: postgres:16-alpine
    container_name: frmhg-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frmhg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: frmhg-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data

  # MinIO for document storage
  minio:
    image: minio/minio:latest
    container_name: frmhg-minio-dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_dev:/data

volumes:
  postgres_data_dev:
  redis_data_dev:
  minio_data_dev: